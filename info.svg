<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-label="Sage Mini Movers – Small Moves Made Easy, Durban">
  <title>Sage Mini Movers | Durban Mini Movers | Call 072 322 0507</title>

  <defs>
    <!-- Background radial glows (userSpaceOnUse for predictable coverage) -->
    <radialGradient id="bgG1" cx="576" cy="90" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ea043" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgG2" cx="140" cy="420" r="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ea043" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Green linear gradient (accent bar, pills, highlights) -->
    <linearGradient id="grnLin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>

    <!-- Truck cargo body: top-to-bottom dark green -->
    <linearGradient id="cargoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#165c24"/>
    </linearGradient>

    <!-- Truck cab: slightly lighter green -->
    <linearGradient id="cabGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40c057"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>

    <!-- Tire: dark radial -->
    <radialGradient id="tireG" cx="32%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>

    <!-- 1.3T badge background -->
    <radialGradient id="badgeG" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a4226"/>
      <stop offset="100%" stop-color="#091410"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Subtle text glow for headline -->
    <filter id="txtGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot-grid pattern overlay -->
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#2ea043" fill-opacity="0.15"/>
    </pattern>
  </defs>

  <!-- ═══════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════ -->
  <rect width="800" height="500" fill="#0d1117"/>
  <rect width="800" height="500" fill="url(#bgG1)"/>
  <rect width="800" height="500" fill="url(#bgG2)"/>
  <!-- Dot-grid texture -->
  <rect width="800" height="500" fill="url(#dotGrid)"/>
  <!-- Outer border -->
  <rect x="1.5" y="1.5" width="797" height="497" rx="6" fill="none"
        stroke="#2ea043" stroke-width="1.5" stroke-opacity="0.28"/>

  <!-- Vertical separator (dashed) -->
  <line x1="414" y1="28" x2="414" y2="472"
        stroke="#30363d" stroke-width="1"
        stroke-dasharray="5,6" stroke-opacity="0.55"/>

  <!-- ═══════════════════════════════════════
       LEFT PANEL — Company Text Content
  ═══════════════════════════════════════ -->

  <!-- ── Location badge ── -->
  <rect x="40" y="38" width="220" height="28" rx="14"
        fill="#0b1f0f" stroke="#2ea043" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="57" cy="52" r="5" fill="#2ea043" fill-opacity="0.25"
          stroke="#2ea043" stroke-width="1.2"/>
  <circle cx="57" cy="52" r="2.5" fill="#3fb950"/>
  <text x="70" y="52" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="700" fill="#3fb950" letter-spacing="1.5">DURBAN, SOUTH AFRICA</text>

  <!-- ── SAGE headline ── -->
  <text x="38" y="122"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="62" font-weight="900" fill="#f0f6fc"
        letter-spacing="-3" filter="url(#txtGlow)">SAGE</text>

  <!-- ── MINI MOVERS subheadline ── -->
  <text x="42" y="156"
        font-family="Arial, Helvetica, sans-serif"
        font-size="24" font-weight="700" fill="#3fb950" letter-spacing="6">MINI MOVERS</text>

  <!-- ── Green accent bar ── -->
  <rect x="42" y="167" width="108" height="3.5" rx="2" fill="url(#grnLin)"/>

  <!-- ── Tagline ── -->
  <text x="42" y="193"
        font-family="Arial, Helvetica, sans-serif"
        font-size="16" fill="#8b949e">Small moves made easy — Perfect for:</text>

  <!-- ── Services 2-column grid ── -->
  <!-- Row 1 -->
  <circle cx="52" cy="218" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="64" y="218" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Small Offices</text>

  <circle cx="208" cy="218" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="220" y="218" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Small Apartments</text>

  <!-- Row 2 -->
  <circle cx="52" cy="244" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="64" y="244" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Granny Flats</text>

  <circle cx="208" cy="244" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="220" y="244" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Student Residences</text>

  <!-- Row 3 -->
  <circle cx="52" cy="270" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="64" y="270" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Partial Moves</text>

  <circle cx="208" cy="270" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="220" y="270" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Single Items</text>

  <!-- Row 4 -->
  <circle cx="52" cy="296" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="64" y="296" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Garden Refuse</text>

  <circle cx="208" cy="296" r="4.5" fill="#2ea043" fill-opacity="0.9"/>
  <text x="220" y="296" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#c9d1d9">Junk Removals</text>

  <!-- ── Divider ── -->
  <line x1="42" y1="318" x2="395" y2="318"
        stroke="#30363d" stroke-width="1"/>

  <!-- ── Call Grant label ── -->
  <text x="42" y="342" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" font-weight="700" fill="#8b949e" letter-spacing="1.8">CALL GRANT</text>

  <!-- ── Phone number (large) ── -->
  <text x="38" y="384"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="34" font-weight="900" fill="#f0f6fc" letter-spacing="-0.5">072 322 0507</text>



  <!-- ── Address ── -->
  <text x="42" y="446"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5" fill="#555e68">9 Fig Tree Rise St, Durban North, Durban, 4051</text>

  <!-- ── Registration ── -->
  <text x="42" y="464"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9.5" fill="#3d4450">Sage Mini Movers (PTY) LTD  |  Reg No: 2024/509688/07</text>

  <!-- ═══════════════════════════════════════
       RIGHT PANEL — Badge + Truck Illustration
  ═══════════════════════════════════════ -->

  <!-- ── Ambient glow behind badge ── -->
  <circle cx="650" cy="132" r="110" fill="#2ea043" fill-opacity="0.05"/>
  <circle cx="650" cy="132" r="75" fill="#2ea043" fill-opacity="0.05"/>

  <!-- ── 1.3T Badge (outer ring) ── -->
  <circle cx="650" cy="132" r="76"
          fill="url(#badgeG)"
          stroke="#2ea043" stroke-width="1.5" stroke-opacity="0.65"
          filter="url(#shadow)"/>
  <!-- Dashed inner ring decoration -->
  <circle cx="650" cy="132" r="68"
          fill="none"
          stroke="#2ea043" stroke-width="0.8" stroke-opacity="0.3"
          stroke-dasharray="3,5"/>
  <!-- Badge top label -->

  <!-- Main "1.3T" value -->
  <text x="650" y="151" text-anchor="middle"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="42" font-weight="900" fill="#3fb950">1.3T</text>
  <!-- Badge bottom label -->

  <!-- ── PER LOAD RATES pill (right of badge) ── -->
  <rect x="410" y="40" width="130" height="30" rx="15" fill="url(#grnLin)"
        filter="url(#shadow)"/>
  <text x="475" y="55" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="700" fill="#ffffff" letter-spacing="0.6">PER LOAD RATES</text>

  <!-- ── RATCHETS & CARGO TIES pill (left of badge) ── -->
  <rect x="410" y="186" width="180" height="30" rx="15"
        fill="#0b1f0f" stroke="#2ea043" stroke-width="1" stroke-opacity="0.45"/>
  <text x="498" y="201" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="600" fill="#3fb950" letter-spacing="0.4">RATCHETS &amp; CARGO TIES</text>

  <!-- ═══════════════════════════════════════
       TRUCK ILLUSTRATION  (faces LEFT — cab at left, cargo at right)
       Cargo: x=542–758  y=248–356
       Cab:   x=452–542  y=266–356
       Hood:  x=428–452  y=266–356
       Chassis: x=428–758  y=354–365
       Wheels: cy=388 r=23 (front cx=478, rear cx=604 & cx=664)
       Ground:  y=411
  ═══════════════════════════════════════ -->

  <!-- Ground shadow -->
  <ellipse cx="596" cy="412" rx="170" ry="10"
           fill="#000000" fill-opacity="0.4"/>

  <!-- ── Cargo body ── -->
  <rect x="542" y="248" width="216" height="108" rx="5"
        fill="url(#cargoGrad)" filter="url(#shadow)"/>
  <!-- Cargo border -->
  <rect x="542" y="248" width="216" height="108" rx="5"
        fill="none" stroke="#1a4a20" stroke-width="1.4"/>
  <!-- Door split (vertical centre line) -->
  <line x1="648" y1="248" x2="648" y2="356"
        stroke="#1a4a20" stroke-width="1.4"/>
  <!-- Lower rail -->
  <line x1="542" y1="332" x2="758" y2="332"
        stroke="#1a4a20" stroke-width="1" stroke-opacity="0.55"/>
  <!-- Door latch bar -->
  <rect x="642" y="280" width="12" height="28" rx="4" fill="#1a4a20"/>
  <circle cx="648" cy="296" r="4" fill="#3fb950" fill-opacity="0.45"/>
  <!-- Roof highlight stripe -->
  <rect x="542" y="248" width="216" height="8" rx="5"
        fill="#3fb950" fill-opacity="0.45"/>
  <!-- Branding text on cargo -->
  
  <!-- Sage logo mark (circle) on right door -->
  <circle cx="712" cy="292" r="22"
          fill="#1a4a20" fill-opacity="0.55"/>
  <text x="712" y="292" dominant-baseline="middle" text-anchor="middle"
        font-family="'Arial Black', Arial, Helvetica, sans-serif"
        font-size="10" font-weight="900" fill="#3fb950" letter-spacing="1">SMM</text>

  <!-- ── Cab body ── -->
  <rect x="452" y="266" width="90" height="90" rx="5"
        fill="url(#cabGrad)" filter="url(#shadow)"/>
  <!-- Cab border -->
  <rect x="452" y="266" width="90" height="90" rx="5"
        fill="none" stroke="#1a6b2a" stroke-width="1"/>
  <!-- Cab roof highlight -->
  <rect x="452" y="266" width="90" height="8" rx="5"
        fill="#4fc660" fill-opacity="0.5"/>

  <!-- ── Hood / nose (slopes away to the left) ── -->
  <!-- Trapezoid: top-right (452,268), top-left (430,286), bottom-left (430,356), bottom-right (452,356) -->
  <path d="M452,268 L430,287 L430,356 L452,356 Z"
        fill="#2ea043"/>
  <!-- Hood highlight at top edge -->
  <line x1="450" y1="268" x2="431" y2="285"
        stroke="#3fb950" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Hood border -->
  <path d="M452,268 L430,287 L430,356 L452,356"
        fill="none" stroke="#1a6b2a" stroke-width="1"/>

  <!-- ── Windshield glass (on hood slope face) ── -->
  <path d="M450,276 L432,292 L432,323 L450,323 Z"
        fill="#1e3a5c" fill-opacity="0.88"
        stroke="#4a7a9b" stroke-width="0.8"/>
  <!-- Windshield glare -->
  <line x1="437" y1="296" x2="448" y2="318"
        stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- ── Cab side window ── -->
  <rect x="458" y="276" width="54" height="36" rx="3"
        fill="#1e3a5c" fill-opacity="0.78"
        stroke="#4a7a9b" stroke-width="0.8"/>
  <!-- Window glare -->
  <line x1="465" y1="280" x2="474" y2="308"
        stroke="#ffffff" stroke-width="1" stroke-opacity="0.18"/>

  <!-- ── Cab door handle ── -->
  <rect x="482" y="327" width="18" height="5" rx="2.5" fill="#1a4a20"/>

  <!-- ── Side mirror ── -->
  <rect x="425" y="283" width="15" height="10" rx="2"
        fill="#1a4a20" stroke="#3fb950" stroke-width="0.6" stroke-opacity="0.5"/>
  <line x1="432" y1="293" x2="432" y2="304"
        stroke="#1a4a20" stroke-width="2.5"/>

  <!-- ── Headlights on nose face ── -->
  <!-- Upper headlight (white/amber) -->
  <rect x="423" y="294" width="9" height="16" rx="3"
        fill="#fffbe6" fill-opacity="0.9"/>
  <rect x="423" y="292" width="9" height="4" rx="2"
        fill="#ffd700" fill-opacity="0.7"/>
  <!-- Lower brake/reverse light (red) -->
  <rect x="423" y="338" width="9" height="9" rx="2"
        fill="#ff4444" fill-opacity="0.8"/>

  <!-- ── Running board ── -->
  <rect x="452" y="348" width="90" height="8" rx="2"
        fill="#1a4a20" fill-opacity="0.75"/>

  <!-- ── Chassis / frame ── -->
  <rect x="430" y="354" width="330" height="11" rx="3"
        fill="#13191f" stroke="#2a3040" stroke-width="0.8"/>

  <!-- Fuel tank on chassis under cargo -->
  <rect x="636" y="335" width="18" height="38" rx="4"
        fill="#1a2a1f" stroke="#2ea043" stroke-width="0.8" stroke-opacity="0.45"/>

  <!-- ── WHEELS (cy=388, r=23) ── -->
  <!-- Front wheel: cx=478 (under cab, centered around x=452–542) -->
  <circle cx="478" cy="388" r="23" fill="url(#tireG)" filter="url(#shadow)"/>
  <circle cx="478" cy="388" r="14" fill="#1c1c1c"/>
  <circle cx="478" cy="388" r="8.5" fill="#282828"/>
  <circle cx="478" cy="388" r="3.5" fill="#444"/>
  <!-- Lug nuts (5) -->
  <circle cx="478" cy="375.5" r="2.2" fill="#555"/>
  <circle cx="489.5" cy="383.5" r="2.2" fill="#555"/>
  <circle cx="485.8" cy="398.5" r="2.2" fill="#555"/>
  <circle cx="470.2" cy="398.5" r="2.2" fill="#555"/>
  <circle cx="466.5" cy="383.5" r="2.2" fill="#555"/>
  <!-- Tyre highlight arc -->
  <path d="M466,369 A23,23 0 0 1 494,378"
        fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>

  <!-- Rear wheel 1: cx=604 -->
  <circle cx="604" cy="388" r="23" fill="url(#tireG)" filter="url(#shadow)"/>
  <circle cx="604" cy="388" r="14" fill="#1c1c1c"/>
  <circle cx="604" cy="388" r="8.5" fill="#282828"/>
  <circle cx="604" cy="388" r="3.5" fill="#444"/>
  <circle cx="604" cy="375.5" r="2.2" fill="#555"/>
  <circle cx="615.5" cy="383.5" r="2.2" fill="#555"/>
  <circle cx="611.8" cy="398.5" r="2.2" fill="#555"/>
  <circle cx="596.2" cy="398.5" r="2.2" fill="#555"/>
  <circle cx="592.5" cy="383.5" r="2.2" fill="#555"/>
  <path d="M592,369 A23,23 0 0 1 620,378"
        fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>

  <!-- Rear wheel 2: cx=664 -->
  <circle cx="664" cy="388" r="23" fill="url(#tireG)" filter="url(#shadow)"/>
  <circle cx="664" cy="388" r="14" fill="#1c1c1c"/>
  <circle cx="664" cy="388" r="8.5" fill="#282828"/>
  <circle cx="664" cy="388" r="3.5" fill="#444"/>
  <circle cx="664" cy="375.5" r="2.2" fill="#555"/>
  <circle cx="675.5" cy="383.5" r="2.2" fill="#555"/>
  <circle cx="671.8" cy="398.5" r="2.2" fill="#555"/>
  <circle cx="656.2" cy="398.5" r="2.2" fill="#555"/>
  <circle cx="652.5" cy="383.5" r="2.2" fill="#555"/>
  <path d="M652,369 A23,23 0 0 1 680,378"
        fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Motion lines behind truck (subtle speed marks) ── -->
  <line x1="775" y1="278" x2="748" y2="278"
        stroke="#2ea043" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="780" y1="296" x2="744" y2="296"
        stroke="#2ea043" stroke-width="2.5" stroke-opacity="0.2" stroke-linecap="round"/>
  <line x1="775" y1="314" x2="748" y2="314"
        stroke="#2ea043" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- ── Bottom info banner (right panel) ── -->
  <rect x="424" y="428" width="358" height="38" rx="8"
        fill="#0b1f0f" stroke="#2ea043" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Leaf/garden icon dot -->
  <circle cx="438" cy="447" r="5" fill="#2ea043" fill-opacity="0.8"/>
  <text x="448" y="447" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" font-weight="700" fill="#3fb950" letter-spacing="0.4">WE ALSO DO GARDEN REFUSE &amp; JUNK REMOVALS</text>

</svg>
